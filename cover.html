<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Game Finder 🎮</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

   <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: #b9dbf8;
            color: #003366;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: #003366;
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            color: #666666; 
            font-size: 18px;
            margin-bottom: 40px;
        }

        button {
            padding: 12px 25px;
            border-radius: 25px;
            border: 1px solid #1e90ff;
            background: #1e90ff; 
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background: #4682b4; 
        }

        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        footer {
            padding: 10px 0;
            font-size: 12px;
            color: #fff;
            background-color: #003366; 
            width: 100%;
            text-align: center;
            position: relative;
            bottom: 0;
        }

        footer a {
            color: #fff;
            text-decoration: none;
            margin-left: 5px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎮 Game Finder 🎮</h1>
      <p>Temukan game favorit kamu dengan mudah ✨</p>
      <a href="/home">
        <button>Start Exploring 🚀</button>
      </a>
    </div>

    <footer>
      <p>&copy; 2026 Game Finder | <a href="/privacy">Aulia Az Zahra</a></p>
    </footer>
  </body>
</html>
